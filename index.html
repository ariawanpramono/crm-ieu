<!doctype html>
<html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>CRM - Dashboard</title>
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
      <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
      <link rel="stylesheet" href="style.css" />
    </head>
    <body>
      <div id="wrapper">
      <div class="sidebar" id="sidebar-target">Sedang memuat menu...</div>
      <!-- Dashboard Analitik -->
      <div id="content">
          <div class="header-dashboard">
            <h1>Dashboard Utama</h1>
            <p>Ringkasan Data Sekolah & Prospek Terkini</p>
          </div>
          <!-- Summary Cards (Tetap ada) -->
          <div class="summary-container">
            <div class="card card-signed">
                <h3 id="signedCount">1</h3>
                <p>Signed</p>
            </div>
            <div class="card card-hot">
                <h3 id="hotCount">1</h3>
                <p>Hot Prospect</p>
            </div>
            <div class="card card-approach">
                <h3 id="approachCount">1</h3>
                <p>Initial Approach</p>
            </div>
          </div>
          <!-- Chart Section -->
          <div class="chart-section">
            <div class="table-header">
                <h3>📊 Analisis Status Prospek</h3>
            </div>
            <!-- Pie Chart Placeholder -->
            <div class="chart-container">
                <canvas id="statusChart" width="400" height="400"></canvas>
            </div>
            <!-- Chart Map -->
            <div class="table-header">
                <h3>🏆 Sebaran Lokasi Sekolah</h3>
            </div>
            <div class="chart-container">
                <div id="map" style="height: 400px; width: 100%; background: #eee; border-radius: 8px;">
                </div>
            </div>
          </div>
      </div>
      <script src="script.js"></script>
    </body>
</html>
